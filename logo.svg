<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Light background -->
  <rect width="800" height="600" fill="#f5f5f5"/>
  
  <!-- Hands -->
  <!-- Left hand (Blue) -->
  <path d="M 300 280 Q 280 300 290 350 Q 300 360 310 350 Q 300 310 320 280" fill="#2563eb" opacity="0.9"/>
  <ellipse cx="295" cy="270" rx="25" ry="35" fill="#2563eb" opacity="0.9"/>
  
  <!-- Right hand (Yellow/Gold) -->
  <path d="M 500 280 Q 520 300 510 350 Q 500 360 490 350 Q 500 310 480 280" fill="#fbbf24" opacity="0.9"/>
  <ellipse cx="505" cy="270" rx="25" ry="35" fill="#fbbf24" opacity="0.9"/>
  
  <!-- Heart (Orange/Coral gradient) -->
  <defs>
    <radialGradient id="heartGradient" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#ff9966;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b4d;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <path d="M 400 220 C 400 200 385 185 370 185 C 360 185 350 195 340 210 C 330 195 320 185 310 185 C 295 185 280 200 280 220 C 280 250 320 290 400 350 C 480 290 520 250 520 220 C 520 200 505 185 490 185 C 480 185 470 195 460 210 C 450 195 440 185 430 185 C 415 185 400 200 400 220 Z" fill="url(#heartGradient)"/>
  
  <!-- House inside heart (White) -->
  <g>
    <!-- Roof -->
    <polygon points="400,250 370,280 430,280" fill="#ffffff"/>
    <!-- Body -->
    <rect x="370" y="280" width="60" height="50" fill="#ffffff"/>
    <!-- Door -->
    <rect x="385" y="290" width="30" height="40" fill="#ff6b4d" opacity="0.8"/>
    <!-- Door handle -->
    <circle cx="412" cy="310" r="3" fill="#fbbf24"/>
    <!-- Window -->
    <rect x="375" y="285" width="10" height="10" fill="#2563eb" opacity="0.6"/>
  </g>
  
  <!-- Main text: Springs Hope Care -->
  <text x="400" y="420" font-family="'Segoe UI', Arial, sans-serif" font-size="70" font-weight="300" text-anchor="middle" letter-spacing="2">
    <tspan fill="#2563eb">Springs </tspan><tspan fill="#fbbf24">Hope</tspan><tspan fill="#2563eb"> Care</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="400" y="475" font-family="'Segoe UI', Arial, sans-serif" font-size="28" fill="#999999" text-anchor="middle" letter-spacing="1">
    Compassionate In-Home Care
  </text>
</svg>